<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="GConsole — A modular browser-based Game Portal" />
  <title>GConsole — Game Portal</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>
  <!-- ===== Header ===== -->
  <header class="header">
    <div class="header__logo">G<span>Console</span></div>
    <div class="header__actions">
      <button class="btn btn--outline" id="btn-leaderboard">🏆 Leaderboard</button>
      <button class="btn btn--outline" id="btn-sync">🔗 Sync</button>
      <button class="btn btn--primary" id="btn-profile">
        <span id="active-profile-name">No Profile</span>
      </button>
    </div>
  </header>

  <!-- ===== Main Content ===== -->
  <main class="main">
    <!-- Banner Ad Slot -->
    <div id="banner-ads"></div>

    <h2 class="section-title">🎮 Choose Your Game</h2>

    <div class="portal-layout">
      <div class="portal-layout__main">
        <div class="game-grid" id="game-grid">
          <!-- Game cards rendered by app.js -->
        </div>

        <!-- Secondary Banner Ad Slot (visible on XL screens) -->
        <div id="banner-ads-secondary"></div>
      </div>

      <!-- Sidebar Ads -->
      <aside class="portal-layout__sidebar" id="sidebar-ads">
        <!-- Sidebar ad slots injected by AdManager -->
      </aside>
    </div>
  </main>

  <!-- ===== Footer ===== -->
  <footer class="footer">
    <p>&copy; 2025 GConsole. All rights reserved. | <a href="#" id="btn-sync-footer">Sync via Google Forms</a></p>
  </footer>

  <!-- ===== Profile Modal ===== -->
  <div class="modal-overlay" id="modal-overlay-profile">
    <div class="modal" id="modal-profile">
      <div class="modal__header">
        <h3 class="modal__title">👤 Player Profiles</h3>
        <button class="modal__close">&times;</button>
      </div>
      <ul class="profile-list">
        <!-- Rendered by app.js -->
      </ul>
    </div>
  </div>

  <!-- ===== Leaderboard Modal ===== -->
  <div class="modal-overlay" id="modal-overlay-leaderboard">
    <div class="modal" id="modal-leaderboard">
      <div class="modal__header">
        <h3 class="modal__title">🏆 Leaderboard</h3>
        <button class="modal__close">&times;</button>
      </div>
      <div class="modal__body">
        <!-- Rendered by app.js -->
      </div>
    </div>
  </div>

  <!-- ===== Create Profile Modal ===== -->
  <div class="modal-overlay" id="modal-overlay-create-profile">
    <div class="modal" id="modal-create-profile">
      <div class="modal__header">
        <h3 class="modal__title">✨ Create Player Profile</h3>
        <button class="modal__close">&times;</button>
      </div>
      <form id="form-create-profile">
        <div class="form-group">
          <label for="input-profile-name">Player Name</label>
          <input type="text" id="input-profile-name" placeholder="Enter your name..." required maxlength="30" autocomplete="off" />
        </div>
        <button type="submit" class="btn btn--primary" style="width: 100%; justify-content: center;">Create Profile</button>
      </form>
    </div>
  </div>

  <!-- ===== Toast ===== -->
  <div class="toast" id="toast"></div>

  <!-- ===== Scripts ===== -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
